<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body { font-family: Arial; margin: 0; background: #f0f2f5; }

.container { display: flex; height: 100vh; }

.dashboard { flex: 3; padding: 10px; }

.chatbot {
    flex: 1;
    background: white;
    padding: 15px;
    border-left: 2px solid #ddd;
    display: flex;
    flex-direction: column;
}

iframe {
    width: 100%;
    height: 95vh;
    border: none;
    border-radius: 8px;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
}

.msg {
    padding: 8px 12px;
    border-radius: 12px;
    margin: 5px 0;
    max-width: 85%;
}

.user {
    background: #0078d4;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e8e8e8;
    color: #333;
}

.input-area {
    display: flex;
    gap: 5px;
}

input {
    flex: 1;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    padding: 8px 12px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- POWER BI DASHBOARD -->
<div class="dashboard">
<iframe src="https://app.powerbi.com/reportEmbed?reportId=17e8ff1f-7652-4c23-81a6-82f2429ecffe&autoAuth=true&ctid=1490b17d-5dc9-4cbf-aeba-a2e854f521b8"></iframe>
</div>

<!-- CHATBOT -->
<div class="chatbot">

<h3>🤖 AI Assistant</h3>

<div id="chat-box"></div>

<div class="input-area">
<input id="user-input" type="text" placeholder="Ask something..." />
<button id="send-btn">Send</button>
</div>

</div>

</div>

<!-- SCRIPT AT BOTTOM (IMPORTANT) -->
<script>

// Wait for page load
window.onload = function () {

    const input = document.getElementById("user-input");
    const button = document.getElementById("send-btn");
    const chatBox = document.getElementById("chat-box");

    function sendMessage() {

        const text = input.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";

        const q = text.toLowerCase();
        let reply = "";

        // Greetings
        if (q.includes("hello") || q.includes("hi") || q.includes("hey")) {
            reply = "Hello! 👋 I'm here to help you explore the dashboard insights.";
        }

        // Hotels
        else if (q.includes("hotel")) {
            reply = "The dashboard includes data for hotels of 4 different states including Banglore with 144, Delhi with 447, Kolkata 126 & Mumbai with 20 .";
        }

        // Price
        else if (q.includes("price")) {
            reply = "The average price is approximately 1.92K across the dataset.";
        }

        // Rating
        else if (q.includes("rating")) {
            reply = "The average rating for all 4 states is around 635.64, reflecting customer satisfaction.";
        }

        // Location
        else if (q.includes("location") || q.includes("city") || q.includes("state")) {
            reply = "You can compare hotel performance across locations using filters in the dashboard.";
        }

        // Compare
        else if (q.includes("compare")) {
            reply = "This dashboard allows comparison of hotels based on price, rating, and location.";
        }

        // Default
        else {
            reply = "Try asking about hotels, price, rating, or location for insights.";
        }

        chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Button click
    button.onclick = sendMessage;

    // Enter key
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

};

</script>

</body>
</html>
